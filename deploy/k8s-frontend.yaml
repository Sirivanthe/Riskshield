apiVersion: apps/v1
kind: Deployment
metadata:
  name: riskshield-frontend
  namespace: riskshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: riskshield-frontend
  template:
    metadata:
      labels:
        app: riskshield-frontend
    spec:
      containers:
      - name: frontend
        image: riskshield-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: riskshield-frontend
  namespace: riskshield
spec:
  selector:
    app: riskshield-frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
