version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: riskshield-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: riskshield
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - riskshield-network

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: riskshield-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=riskshield
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ENVIRONMENT=production
    depends_on:
      - mongo
    ports:
      - "8001:8001"
    networks:
      - riskshield-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: riskshield-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_BACKEND_URL=${BACKEND_URL:-http://localhost:8001}
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - riskshield-network

volumes:
  mongo-data:
    driver: local

networks:
  riskshield-network:
    driver: bridge
