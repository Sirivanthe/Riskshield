apiVersion: v1
kind: Secret
metadata:
  name: riskshield-secrets
  namespace: riskshield
type: Opaque
stringData:
  jwt-secret: "CHANGE_THIS_TO_SECURE_RANDOM_KEY"
  mongo-url: "mongodb://mongo:27017"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: riskshield-config
  namespace: riskshield
data:
  DB_NAME: "riskshield"
  JWT_ALGORITHM: "HS256"
  ENVIRONMENT: "production"
  CORS_ORIGINS: "*"
