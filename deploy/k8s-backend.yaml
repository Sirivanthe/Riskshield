apiVersion: apps/v1
kind: Deployment
metadata:
  name: riskshield-backend
  namespace: riskshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: riskshield-backend
  template:
    metadata:
      labels:
        app: riskshield-backend
    spec:
      containers:
      - name: backend
        image: riskshield-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: riskshield-secrets
              key: mongo-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: riskshield-secrets
              key: jwt-secret
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: riskshield-config
              key: DB_NAME
        - name: JWT_ALGORITHM
          valueFrom:
            configMapKeyRef:
              name: riskshield-config
              key: JWT_ALGORITHM
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: riskshield-config
              key: CORS_ORIGINS
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: riskshield-config
              key: ENVIRONMENT
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: riskshield-backend
  namespace: riskshield
spec:
  selector:
    app: riskshield-backend
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
